name: Auto Run Robot Quan Gia Cloud

on:
  schedule:
    # 22:15 UTC tương ứng với 05:15 sáng giờ Việt Nam (GMT+7)
    - cron: '15 22 * * *'
  workflow_dispatch: # Cho phép bấm nút tự chạy thử trên web bất kỳ lúc nào

# Thêm vào đây để áp dụng cho toàn bộ các bước bên dưới
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn từ Repository
      uses: actions/checkout@v4

    - name: Thiết lập Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt các thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Kích hoạt chạy mã nguồn Python trên Đám mây
      env:
        PUSHBULLET_TOKEN: ${{ secrets.PUSHBULLET_TOKEN }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python locdlvaduasheet.py

    # --- ĐOẠN THÊM MỚI: TỰ ĐỘNG ĐẨY FILE LOG LÊN GIAO DIỆN DƯỚI CÙNG ---
    - name: Lưu trữ tệp Log lịch sử chạy
      if: always() # Luôn luôn chạy bước này kể cả code Python có bị lỗi hay thành công
      uses: actions/upload-artifact@v4
      with:
        name: nhat-ky-thoi-tiet-log
        path: thoitiet_log.txt
        retention-days: 7 # Lưu trữ file log này trong vòng 7 ngày trên GitHub
