name: Auto Run Robot Quan Gia Cloud

on:
  schedule:
    # 23:15 UTC tương ứng với 06:15 sáng giờ Việt Nam (GMT+7)
    - cron: '15 23 * * *'
  workflow_dispatch: # Cho phép bấm nút tự chạy thử trên web bất kỳ lúc nào

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn từ Repository
      uses: actions/checkout@v4

    - name: Thiết lập Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt các thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Kích hoạt chạy mã nguồn Python trên Đám mây
      env:
        PUSHBULLET_TOKEN: ${{ secrets.PUSHBULLET_TOKEN }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python locdlvaduasheet.py
